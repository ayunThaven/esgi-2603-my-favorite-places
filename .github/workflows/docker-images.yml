name: Docker images

on:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build server image
        run: docker build -t mfp-server:latest ./server

      - name: Build client image
        run: docker build -t mfp-client:latest ./client
